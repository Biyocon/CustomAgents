skills:
- id: banebyg
  name: banebyg
  description: Router/index-skill for BaneByg-platformen (BBE, BKP v17, BBTR, YB, TBL, Tilsynsappen).
    Dirigerer til de dedikerede detalje-skills. Brug når brugeren arbejder med Banedanmarks byggeplatform
    og skal finde det rette fagområde.
- id: bbe-dokumenter-platform
  name: bbe-dokumenter-platform
  description: 'Samlet skill til BaneByg Enterprise dokumenter og platformstyring. Dækker: (1) Ydelsesbeskrivelsen
    (YB/SABTAG) med to-kolonne format og 17 fagposter, (2) Tilbudslisten (TBL) Excel-generering med fagpost-faner
    og CO2-beregning, (3) Bilag og BKP-integration, (4) UI-design og videreudvikling fra Interface Manager-perspektiv,
    (5) Brugervejledninger til de 4 brugerroller, (6) Normer og standarder (AAB, SAB, Banenormer, TekDok).
    Brug ved arbejde med BBE-dokumenter, platformoptimering, brugerguides eller standardreferencer. For
    selve BKP-sammenskrivning: se separat bkp-v17-overview skill.'
- id: bbtr-anlaeg
  name: bbtr-anlaeg
  description: Supports civil works (jord, afvanding, broer og konstruktioner) deliverables in BBTR/BaneByg
    projects, including fagpakke content, applicable standards and supervision points. Use this skill
    when drafting, reviewing or supervising anlaeg-related fagpakker, tilbudslister or control plans.
- id: bbtr-csm-tsi-compliance
  name: bbtr-csm-tsi-compliance
  description: Ensures compliance with Common Safety Method for Risk Evaluation and Assessment (CSM-RA)
    and Technical Specifications for Interoperability (TSI). Use this skill when identifying, documenting
    or verifying regulatory requirements in BBTR projects.
- id: bbtr-design-management
  name: bbtr-design-management
  description: Supports design management and design authority work in BaneByg/BBTR projects, ensuring
    the technical solution is fit for purpose and fulfils contract requirements. Use this skill when governing
    design decisions, approving design solutions, or exercising technical project ownership.
- id: bbtr-dokumentstyring
  name: bbtr-dokumentstyring
  description: Applies BBTR document and template management standards to ensure consistency and version
    control. Use this skill when creating, naming and handling project documents.
- id: bbtr-fagpakkestruktur
  name: bbtr-fagpakkestruktur
  description: Applies the standard BBTR structure for fagpakker with clear sections for deliverables,
    ATR, staffing, appendices and cross-disciplinary requirements. Use this when defining or reviewing
    fagpakker.
- id: bbtr-faseopdelt-ydelser
  name: bbtr-faseopdelt-ydelser
  description: Splits BaneByg advisory deliverables into phases (scoping, detail design, execution and
    completion). Use when planning and following up on phase-specific deliverables in BBTR projects.
- id: bbtr-forbedringsloop
  name: bbtr-forbedringsloop
  description: Manages changes and continuous improvements in a version‑controlled manner. Use this skill
    to capture lessons learned and implement iterative improvements in BBTR projects.
- id: bbtr-gis-og-data
  name: bbtr-gis-og-data
  description: Supports GIS work and data management in Banedanmark/BBTR contexts — map production, geographic
    infrastructure data, data extraction and data-coordination roles. Use this skill when handling GIS
    deliverables, geodata for railway projects, or mapping Data Manager/GIS role responsibilities.
- id: bbtr-haendelseshaandtering
  name: bbtr-haendelseshaandtering
  description: Structures handling of safety incidents and deviations in BBTR projects, from immediate
    response and reporting through investigation to corrective actions and lessons learned. Use this skill
    when an incident, near-miss or safety deviation occurs on a BBTR project and must be reported, followed
    up and fed into the improvement loop.
- id: bbtr-ibrugtagning
  name: bbtr-ibrugtagning
  description: Guides commissioning and handover-to-operations in BBTR/Banedanmark projects, ensuring
    systems put into service are approved and compliant with applicable norms. Use this skill when planning
    ibrugtagning, preparing safety approvals, or handing a delivery over to operations.
- id: bbtr-indstilling-writer
  name: bbtr-indstilling-writer
  description: Writes formal decision memoranda (indstillingsnotater) in Banedanmark format. Use when
    drafting proposals for leadership requesting funding, approval or strategic decisions for BBTR.
- id: bbtr-ipm-konsistens
  name: bbtr-ipm-konsistens
  description: Ensures alignment between the Integrated Project Model (IPM), production setup and actual
    project activities. Use this skill to verify consistency across plans, schedules and deliverables.
- id: bbtr-it-systemer
  name: bbtr-it-systemer
  description: Supports IT system administration, access management and technical system responsibility
    analysis in Banedanmark/BBTR contexts. Use this skill when working with TMS, asset/documentation systems,
    SharePoint or DTC technical systems, or when mapping IT roles' responsibilities and access-control
    obligations.
- id: bbtr-koeplanlaegning
  name: bbtr-koeplanlaegning
  description: Supports timetable planning and capacity allocation analysis in Banedanmark/BBTR contexts.
    Use this skill when working with koereplan (timetable) tasks, capacity applications, or when mapping
    the Koereplanlaegger role's responsibilities and process references.
- id: bbtr-kontraktstyring
  name: bbtr-kontraktstyring
  description: Supports contract administration in BBTR/BaneByg projects, including change orders, supplier
    follow-up, claims handling and contract close-out. Use this skill when setting up, monitoring or closing
    contracts, handling contract changes, or preparing escalation and dispute material.
- id: bbtr-kvalitet-dod
  name: bbtr-kvalitet-dod
  description: Verifies Definition of Done (DoD), performs reception control and ensures deliverable quality.
    Use this skill to check that deliverables meet acceptance criteria before handover.
- id: bbtr-leverance-mapping
  name: bbtr-leverance-mapping
  description: Maps each deliverable to the correct document and drawing lists without ad‑hoc references.
    Use this to create or verify deliverable schedules and document lists.
- id: bbtr-materiel-og-teknik
  name: bbtr-materiel-og-teknik
  description: Supports coordination of rolling stock and technical equipment in BBTR/Banedanmark projects,
    including vehicle approvals, route compatibility and ECM technical supervision. Use this skill when
    coordinating materiel, machine resources, or vehicle approval/compatibility questions.
- id: bbtr-oekonomi-og-budget
  name: bbtr-oekonomi-og-budget
  description: Supports project financial management in BBTR/BaneByg projects, including budgeting, periodisation,
    forecasting, cost control and financial reporting in SAP. Use this skill when preparing or following
    up on project budgets, reviewing spend against contracts, or producing financial status reports and
    forecasts.
- id: bbtr-planlaegning
  name: bbtr-planlaegning
  description: Supports planning coordination in BaneByg/BBTR projects, covering schedules, resources,
    dependencies and critical paths. Use this skill when building or maintaining time plans, coordinating
    resources across work packages, or tracking milestones and dependencies.
- id: bbtr-presentation-builder
  name: bbtr-presentation-builder
  description: Builds leadership presentations for BBTR with Banedanmark visual identity, audience-adapted
    messaging and data-driven storytelling. Use when creating PowerPoint decks for management or board
    presentations.
- id: bbtr-produktionssetup
  name: bbtr-produktionssetup
  description: Applies BBTR production setup standards, including project plan, job instructions, meeting
    structures and continuous improvement loops. Use this skill when establishing or auditing the production
    setup for a project.
- id: bbtr-projektering
  name: bbtr-projektering
  description: Supports design-phase management (projektering) in BaneByg/BBTR projects, including quality
    assurance of consultant deliverables, design planning and technical risk assessment. Use this skill
    when leading or quality-assuring the projektering phase of a renewal or construction project.
- id: bbtr-projektstyring
  name: bbtr-projektstyring
  description: Supports project management of BaneByg/BBTR projects within time, cost, quality, scope
    and risk constraints. Use this skill when planning, steering or following up on a BBTR project's progress,
    milestones, resources and reporting.
- id: bbtr-raadgiver-udbud
  name: bbtr-raadgiver-udbud
  description: Supports the preparation and execution of advisory tenders and mini‑tenders in BBTR projects.
    Use this skill to draft requirements, evaluate consultants and manage the tender process.
- id: bbtr-risiko-myndighed
  name: bbtr-risiko-myndighed
  description: Supports risk screening, environmental assessments and authority processes in BBTR projects.
    Use this skill to identify risks, obtain permits and ensure compliance with regulatory requirements.
- id: bbtr-role-justification
  name: bbtr-role-justification
  description: Justifies the Interface Manager role in BBTR by mapping concrete value creation across
    cross-disciplinary coordination, data quality, compliance and platform improvement. Use when presenting
    or defending the role to leadership.
- id: bbtr-sikkerhed-byggeplads
  name: bbtr-sikkerhed-byggeplads
  description: Supports construction-site safety supervision in BBTR projects, covering SR/OR compliance
    on site, work-site safety planning and collection of execution documentation. Use this skill when
    planning site safety, supervising contractors on Banedanmark construction sites, or preparing site
    documentation for CSM/TSI processes.
- id: bbtr-sikkerhed-og-miljo
  name: bbtr-sikkerhed-og-miljo
  description: Coordinates railway safety and environmental requirements across BBTR project phases. Use
    this skill when planning, executing or reviewing BBTR work where railway safety (SR/OR), occupational
    safety or environmental obligations must be identified, assigned and followed up together.
- id: bbtr-sikring
  name: bbtr-sikring
  description: Supports signalling (sikring) design and works deliverables in BBTR/BaneByg projects, aligning
    sikringsteknisk projektering with trafikal dokumentation and the FP10 fagpost structure. Use this
    skill when drafting, reviewing or quality-assuring sikring-related fagpakker, design deliverables
    or control points.
- id: bbtr-spor
  name: bbtr-spor
  description: Supports track works (sporlaegning, sporjustering, svejsning, ballast) deliverables in
    BBTR/BaneByg projects with correct fagpost structure, banenorm references and inspection points. Use
    this skill when drafting or reviewing spor-related fagpakker, tilbudsposter or track supervision material.
- id: bbtr-svejsning-og-ndt
  name: bbtr-svejsning-og-ndt
  description: Supports welding quality assurance and non-destructive testing (NDT) coordination for rail
    and rolling stock in BBTR/Banedanmark contexts. Use this skill when planning welding work, quality-assuring
    welded joints, or selecting and documenting NDT inspections.
- id: bbtr-test-og-validering
  name: bbtr-test-og-validering
  description: Supports planning and execution of test and validation activities in BBTR/Banedanmark projects,
    including test management, test safety and prøvekørsel coordination. Use this skill when planning
    tests, coordinating test runs, or validating railway systems before commissioning.
- id: bbtr-trafik-og-drift
  name: bbtr-trafik-og-drift
  description: Supports coordination of train operations, traffic management and operational roles in
    Banedanmark/BBTR contexts. Use this skill when analysing traffic management tasks, mapping operational
    responsibilities (Trafikleder/Togleder roles) or preparing operations-related deliverables that must
    respect railway safety boundaries.
