# Operationelt lag overført fra Sharmake-template (2026-07-01)
# Se docs/audit/integration-plan-sharmake-patterns.md for detaljer.
operational_layer:
  commands:
    path: commands/
    description: Korte, kaldelige workflows
    count: 12
  tools:
    path: tools/
    description: Scripts, beregningshjælpere, validering og automatisering
    subdirs:
      - python
      - excel/schemas
      - excalidraw/templates
      - cad
  templates:
    path: templates/
    description: Genbrugelige faglige og projektstyringsmæssige skabeloner
    subdirs:
      - load-lists
      - work-descriptions
      - tender-lists
      - qa
      - diagrams
      - calculations
      - decision-notes
      - risk-logs
  plugins:
    path: plugins/
    description: Integrationer og adapters til eksterne værktøjer
    entries:
      - sharepoint
      - projectwise
      - teams
      - outlook
      - autocad
      - microstation
      - febdoc
      - simaris

# Udvidet Brain med personlig hukommelse og opgavestyring
extended_brain_paths:
  personal:
    path: brain/personal/
    files:
      - user-profile.md
      - preferences.md
      - lessons-learned.md
      - open-decisions.md
  diary:
    path: brain/diary/
    pattern: YYYY-MM-DD.md
  tasks:
    path: brain/tasks/
    files:
      - today.md
      - backlog.md
      - completed.md